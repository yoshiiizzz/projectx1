<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // 1. Konfigurasi Firebase Milikmu
    const firebaseConfig = {
        apiKey: "AIzaSyCIJXQ7NSAPnLxRh34_zhcd5-q5buP_fKQ",
        authDomain: "projectx1-72726.firebaseapp.com",
        databaseURL: "https://projectx1-72726-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "projectx1-72726",
        storageBucket: "projectx1-72726.firebasestorage.app",
        messagingSenderId: "942733522841",
        appId: "1:942733522841:web:e508544e166554ee274508"
    };

    firebase.initializeApp(firebaseConfig);
    const dbPintar = firebase.database().ref("Jemuran_Pintar");
    const dbLog = firebase.database().ref("Jemuran_Log");

    // 2. LOGIKA KONTROL UTAMA & REAL-TIME
    dbPintar.on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            // Cuaca
            const cardCuaca = document.getElementById("card_cuaca");
            const iconCuaca = document.getElementById("icon_cuaca");
            const txtHujan = document.getElementById("txt_hujan");

            if (data.kondisi_hujan) {
                cardCuaca.className = "card p-4 text-center weather-hujan h-100";
                iconCuaca.innerHTML = '<i class="fa-solid fa-cloud-showers-heavy pulse-anim"></i>';
                txtHujan.innerText = "HUJAN TURUN";
            } else {
                cardCuaca.className = "card p-4 text-center weather-cerah h-100";
                iconCuaca.innerHTML = '<i class="fa-solid fa-sun"></i>';
                txtHujan.innerText = "CERAH";
            }
            
            // Status Jemuran
            const txtJemuran = document.getElementById("txt_jemuran");
            const iconJemuran = document.getElementById("icon_jemuran");
            txtJemuran.innerText = data.status_jemuran;
            
            if (data.status_jemuran.includes("Terbuka")) {
                txtJemuran.className = "badge bg-success status-badge";
                iconJemuran.innerHTML = '<i class="fa-solid fa-door-open text-success"></i>';
            } else {
                txtJemuran.className = "badge bg-secondary status-badge";
                iconJemuran.innerHTML = '<i class="fa-solid fa-door-closed text-secondary"></i>';
            }
            
            // Tombol Kontrol Servo
            const btnK = document.getElementById("btn_kontrol");
            if (data.kontrol_manual) {
                btnK.innerHTML = '<i class="fa-solid fa-toggle-on"></i> MATIKAN MANUAL (KEMBALI AUTO)';
                btnK.className = "btn btn-primary btn-custom w-100 mb-3 shadow pulse-anim";
            } else {
                btnK.innerHTML = '<i class="fa-solid fa-toggle-off"></i> AKTIFKAN MODE MANUAL';
                btnK.className = "btn btn-outline-primary btn-custom w-100 mb-3 shadow-sm";
            }

            // Tombol Buzzer
            const btnB = document.getElementById("btn_buzzer");
            if (data.buzzer_manual) {
                btnB.innerHTML = '<i class="fa-solid fa-bell pulse-anim"></i> MATIKAN BUZZER';
                btnB.className = "btn btn-danger btn-custom w-100 shadow";
            } else {
                btnB.innerHTML = '<i class="fa-solid fa-bell-slash"></i> BUNYIKAN BUZZER';
                btnB.className = "btn btn-outline-danger btn-custom w-100 shadow-sm";
            }

            // Update Jadwal
            if (document.activeElement !== document.getElementById("input_buka")) {
                document.getElementById("input_buka").value = data.waktu_buka;
            }
            if (document.activeElement !== document.getElementById("input_tutup")) {
                document.getElementById("input_tutup").value = data.waktu_tutup;
            }
        }
    });

    // Event Listeners Tombol Kontrol
    document.getElementById("btn_kontrol").onclick = () => {
        let isManualActive = document.getElementById("btn_kontrol").innerText.includes("MATIKAN");
        dbPintar.update({ kontrol_manual: !isManualActive });
    };

    document.getElementById("btn_buzzer").onclick = () => {
        let isBuzzerActive = document.getElementById("btn_buzzer").innerText.includes("MATIKAN");
        dbPintar.update({ buzzer_manual: !isBuzzerActive });
    };

    document.getElementById("btn_save_time").onclick = () => {
        const btnSave = document.getElementById("btn_save_time");
        const originalText = btnSave.innerHTML;
        btnSave.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...';
        
        dbPintar.update({
            waktu_buka: document.getElementById("input_buka").value,
            waktu_tutup: document.getElementById("input_tutup").value
        }).then(() => {
            setTimeout(() => {
                btnSave.innerHTML = '<i class="fa-solid fa-check"></i> Tersimpan!';
                btnSave.className = "btn btn-success btn-custom w-100 mt-auto shadow";
                setTimeout(() => {
                    btnSave.innerHTML = originalText;
                    btnSave.className = "btn btn-success btn-custom w-100 mt-auto shadow-sm";
                }, 2000);
            }, 500);
        });
    };

    // -------------------------------------------------------------
    // 3. LOGIKA GRAFIK DAN TABEL RIWAYAT HUJAN (UPGRADE)
    // -------------------------------------------------------------
    
    // Setup Chart.js
    const ctx = document.getElementById('rainChart').getContext('2d');
    let rainChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: [], 
            datasets: [{
                label: 'Frekuensi Hujan Turun (Kali)',
                data: [], 
                backgroundColor: 'rgba(54, 162, 235, 0.6)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1,
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true, ticks: { stepSize: 1 } }
            }
        }
    });

    // Menarik Data Log dari Firebase
    dbLog.on('value', (snapshot) => {
        const tbody = document.getElementById('table_log');
        tbody.innerHTML = ''; // Bersihkan tabel
        
        let logData = [];
        let chartDataMap = {}; // Untuk menghitung jumlah per tanggal

        snapshot.forEach((childSnapshot) => {
            let item = childSnapshot.val();
            logData.push(item);

            // Menghitung untuk Grafik
            if (chartDataMap[item.tanggal]) {
                chartDataMap[item.tanggal]++;
            } else {
                chartDataMap[item.tanggal] = 1;
            }
        });

        // Tampilkan Tabel (Urutan terbaru di atas)
        logData.reverse();
        if(logData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" class="text-center text-muted">Belum ada riwayat hujan</td></tr>';
        } else {
            logData.forEach(item => {
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><i class="fa-regular fa-calendar-days text-primary"></i> ${item.tanggal}</td>
                    <td><i class="fa-regular fa-clock text-warning"></i> ${item.waktu}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Update Grafik
        rainChart.data.labels = Object.keys(chartDataMap); // Set label dengan tanggal
        rainChart.data.datasets.data = Object.values(chartDataMap); // Set data dengan jumlah
        rainChart.update();
    });

</script>

</body>
</html>
