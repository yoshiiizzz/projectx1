<!DOCTYPE html>
<html>
<head>
  <title>Rain Detector IoT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f0f0f0;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn-open { background: #4CAF50; color: white; }
    .btn-close { background: #f44336; color: white; }
  </style>
</head>

<body>

  <h1>🌧️ Rain Detector IoT</h1>

  <div class="card">
    <h2>Status Hujan</h2>
    <p id="status">Loading...</p>
  </div>

  <div class="card">
    <h2>Kontrol Jemuran</h2>
    <button class="btn-close" onclick="tutup()">Tutup</button>
    <button class="btn-open" onclick="buka()">Buka</button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase.js"></script>

  <script>
    // 🔥 GANTI INI
    var firebaseConfig = {
      apiKey: "API_KEY_KAMU",
      databaseURL: "https://PROJECT-ID-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    // 📡 Ambil status hujan realtime
    db.ref("sensor/rain").on("value", function(snapshot) {
      var val = snapshot.val();

      if (val == 0) {
        document.getElementById("status").innerHTML = "🌧️ HUJAN";
      } else {
        document.getElementById("status").innerHTML = "☀️ TIDAK HUJAN";
      }
    });

    // 🎛️ Tombol kontrol
    function tutup() {
      db.ref("control/servo").set(1);
    }

    function buka() {
      db.ref("control/servo").set(0);
    }
  </script>

</body>
</html>
